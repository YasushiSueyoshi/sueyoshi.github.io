<!DOCTYPE html>
<html lang="ja">
<head>

  <title>練習｜DESIGN COFFEE｜お問い合わせ</title>
  <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hina+Mincho&family=M+PLUS+Rounded+1c&family=Noto+Sans+JP:wght@100..900&family=Noto+Serif+JP:wght@200..900&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Hina+Mincho&family=M+PLUS+Rounded+1c&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+JP:wght@100..900&family=Noto+Serif+JP:wght@200..900&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <a href="/"><img src="img/log.svg" alt="DESIGN COFFEE" class="header_log"></a>
    <nav>
      <ul class="header_nav">
        <li><a href="#">当店について</a></li>
        <li><a href="#">メニュー</a></li>
        <li><a href="#">店舗情報</a></li>
        <li><a href="contact.html">お問い合わせ</a></li>
      </ul>
    </nav>
  </header>

  <main class="lower_main">
    <div class="inner">
      <div class="lower_heading_group">
        <h1>お問い合わせ</h1>
        <p>ご不明点などがあれば、<br class="br">お気軽にお問い合わせください。</p>
      </div><!-- /.lower_heading_group -->

      <form class="contact_form">
        <div class="contact_form_item">
          <label for="name">お名前</label>
          <input type="text" id="name" placeholder="例）山田 太郎">
        </div>

        <div class="contact_form_item">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" placeholder="例）example@example.com">
        </div>

        <div class="contact_form_item">
          <label for="message">お問い合わせ内容</label>
          <textarea id="message" placeholder="お問い合わせ内容をご入力ください。"></textarea>
        </div>

        <div class="contact_form_btn_area">
          <button type="submit" class="contact_form_btn">送信する</button>
        </div>
      </form>

    </div><!-- /.inner -->
  </main><!-- /.lower_main -->

  <footer>
    <div class="inner">
      <a href="index.html"><img src="img/log_white.svg" alt="" class="footer_log"></a>
      <nav>
        <ul class="footer_nav">
          <li><a href="#">当店について</a></li>
          <li><a href="#"></a>メニュー</li>
          <li><a href="#"></a>店舗情報</li>
          <li><a href="#"></a>お問い合わせ</li>
        </ul>
      </nav>
        <p class="footer_copy">&copy; 2025 DESIGN COFFEE<br>by HTML_CSS&伝わるWebデザイン</p>
    </div><!-- /.inner -->
  </footer>
</body>
</html>
